<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Contrate-me | GameBoss</title>
    <link rel="stylesheet" href="contrate.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="info.html">Sobre o Jogo</a></li>
        <li><a href="skins.html">Skins</a></li>
        <li><a href="contrate.html">Contrate-me</a></li>
      </ul>
    </nav>

    <header>
      <h1>Faça parte da Guilda</h1>
      <p>Compre skins exclusivas ou contrate nossos serviços</p>
    </header>

    <main>
      <section id="formulario-contrate">
        <h2>Formulário de Pedido</h2>
        <form action="#">
          <label>Nome do Jogador:</label>
          <input type="text" placeholder="Digite seu nick ou nome" required />

          <label>Seu e-mail:</label>
          <input type="email" placeholder="exemplo@email.com" required />
          <label>Senha da Conta:</label>
          <input type="password" placeholder="Digite sua senha" required />

          <label>Plataforma principal:</label>
          <select>
            <option value="pc">PC</option>
            <option value="ps5">PlayStation 5</option>
            <option value="xbox">Xbox Series</option>
            <option value="switch">Nintendo Switch</option>
          </select>

          <label>O que você deseja?</label>
          <select>
            <option>Skin (Black Knight)</option>
            <option>Skin (Renegade Raider)</option>
            <option>Coach (Treinamento)</option>
            <option>Aumento de Nível (XP Farm)</option>
            <option>Skin (Sparkle Specialist)</option>
          </select>
          <label>Forma de Pagamento:</label>
          <select>
            <option value="PIX ">PIX</option>
            <option value="PAYPAL">PayPal</option>
            <option value="CARTAO DE CRÉDITO">Cartão de Crédito</option>
            <option value="CARTÃO DE DEBITO">Cartão de Débito</option>
          </select>
          <label for="mensagem">Detalhes adicionais (OPCIONAL):</label>
          <textarea
            id="mensagem"
            rows="4"
            placeholder="Descreva como podemos te ajudar"
          ></textarea>

          <button type="submit">Enviar Pedido</button>
        </form>
      </section>
    </main>

  <footer>
      <p> 2026 - Assinado Fortnite</p>
    </footer>
  </body>
</html>
